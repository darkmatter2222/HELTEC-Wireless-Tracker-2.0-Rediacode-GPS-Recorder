server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # HTTP Basic Auth — same credentials as the susman-ingress proxy.
    # htpasswd file is generated by 10-config.sh at container startup from
    # TRACKER_USER / TRACKER_PASS env vars and mounted (or generated locally).
    auth_basic "Radiological Map";
    auth_basic_user_file /etc/nginx/tracker_htpasswd;

    # Don't cache the runtime config or the index so users always get the
    # latest API_BASE/build after a redeploy.
    location = /config.js {
        add_header Cache-Control "no-store" always;
        try_files /config.js =404;
    }
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    # Hashed assets are immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Proxy /api/ to the ingest service so that browsers accessing this container
    # directly (http://192.168.86.48:8031/tracker/) can reach the API without
    # going through the DuckDNS proxy.  When accessed via susman-ingress the
    # /api/ location block in the ingress handles it instead; this proxy is
    # never hit from the external path.
    location /api/ {
        proxy_pass http://192.168.86.48:8030/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Allow direct LAN access at /tracker/ prefix (same path as the public URL).
    # When accessed through susman-ingress the /tracker/ prefix is stripped before
    # reaching this container, so the blocks above handle it.  When accessed
    # directly (http://192.168.86.48:8031/tracker/...) this block rewrites the
    # prefix away and re-dispatches, making asset & SPA-routing work identically.
    location /tracker/ {
        rewrite ^/tracker/(.*)$ /$1 last;
    }

    location / {
        try_files $uri /index.html;
    }
}
