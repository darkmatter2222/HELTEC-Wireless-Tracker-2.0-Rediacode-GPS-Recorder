server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't cache the runtime config or the index so users always get the
    # latest API_BASE/build after a redeploy.
    location = /config.js {
        add_header Cache-Control "no-store" always;
        try_files /config.js =404;
    }
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    # Hashed assets are immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
