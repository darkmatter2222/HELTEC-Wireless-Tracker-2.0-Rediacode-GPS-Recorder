# dnsmasq config — LAN split-DNS resolver
# Resolves susmannet.duckdns.org to the LAN IP so all local devices can reach
# the tracker/docucraft without hairpin NAT issues.
# All other queries are forwarded to Google's public DNS.

# Don't read /etc/resolv.conf (we specify upstream explicitly)
no-resolv

# Upstream DNS servers
server=8.8.8.8
server=8.8.4.4

# Split-DNS override: resolve the local domain to the LAN IP of the server.
# This makes susmannet.duckdns.org work from inside the LAN without hairpin NAT.
address=/susmannet.duckdns.org/192.168.86.48

# Listen on all interfaces inside the container (port binding in compose
# restricts this to the LAN interface externally).
listen-address=0.0.0.0
bind-interfaces

# Cache 150 entries for speed
cache-size=150

# Log queries (visible via docker logs lan-dns)
log-queries
log-facility=-
