; Heltec HTIT-Tracker - RadiaCode field tracker firmware
; Board: Heltec WiFi LoRa 32 V3 (ESP32-S3) with onboard ST7735 + UC6580 GPS
;
; Two hardware revisions are supported via separate envs:
;   heltec_tracker_v1_2 -- HTIT-Tracker V1.2 (older, color-inverted panel)
;   heltec_tracker_v2   -- HTIT-Tracker V2   (newer, non-inverted panel,
;                                              different RAM offsets)
;
; The V2 panel needs DIFFERENT ST7735 init: invert=false and offsets
; XSTART=0/YSTART=24 instead of V1.2's invert=true / XSTART=1/YSTART=26.
; Booting V1.2 firmware on a V2 panel produces a fully white screen --
; that is the canonical mismatch symptom. See heltec_tracker/AGENTS.md.

[platformio]
default_envs = heltec_tracker_v2

; ----------------------------------------------------------------------------
; Shared base config -- both hardware revisions inherit from this.
; ----------------------------------------------------------------------------
[env]
platform = espressif32 @ ^6.7.0
; board and framework are set in each ESP32-specific env so the native test
; env does not inherit them (native platform does not accept a board ID).

monitor_speed = 115200
upload_speed = 921600

; Custom partition with ~1.5MB LittleFS for CSV session storage.
board_build.partitions = partitions_tracker.csv
board_build.filesystem = littlefs

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_NIMBLE_CPP_LOG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    ; --- Bluetooth 5 extended advertising / scan support. RadiaCode-110
    ;     uses BT5 extended advertising on secondary channels; without
    ;     these flags the controller cannot follow AUX_ADV_IND pointers
    ;     and CONNECT_REQ silently times out (status=13). See NimBLE
    ;     issue #572 -- matches our exact failure pattern.
    -DCONFIG_BT_NIMBLE_EXT_ADV=1
    -DCONFIG_BT_NIMBLE_MAX_EXT_ADV_INSTANCES=0
    -DCONFIG_BT_NIMBLE_EXT_ADV_MAX_SIZE=255
    ; --- Scan duplicate filter: match Bluedroid behaviour (per-device,
    ;     not per-adv-data) so chained ext-adv packets aren't dropped.
    -DCONFIG_BT_CTRL_SCAN_DUPL_TYPE_DATA_DEVICE=1
    -DCONFIG_BT_CTRL_SCAN_DUPL_TYPE=2
    -DARDUINOJSON_ENABLE_STD_STRING=1

lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.2
    mikalhart/TinyGPSPlus @ ^1.0.3
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.4
    adafruit/Adafruit GFX Library @ ^1.11.10
    ; SdFat (greiman) - independent SPI implementation, used as a fallback
    ; when arduino-esp32's stock SD/sd_diskio driver fails with
    ; 'no token received'. Documented workaround in arduino-esp32#6081
    ; / schreibfaul1/ESP32-audioI2S#245.
    greiman/SdFat @ ^2.2.3

; ----------------------------------------------------------------------------
; Hardware-specific envs.
; ----------------------------------------------------------------------------

; HTIT-Tracker V1.2 (older revision: inverted panel, offsets 1/26).
[env:heltec_tracker_v1_2]
board = heltec_wifi_lora_32_V3
framework = arduino
build_flags =
    ${env.build_flags}
    -DTRACKER_HW_V1_2=1

; HTIT-Tracker V2 (newer revision: non-inverted panel, offsets 0/24).
; Per Heltec's HT_st7735.h:  WIRELESS_TRACKER_V2 -> XSTART=0/YSTART=24 and
; st7735_invert_colors(false) called after init.
;
; V2 ships without an SD breakout in this project, so it uses a custom
; partition table that drops the OTA slot and grows LittleFS from 1.5MB
; to ~5.9MB (4x more session storage on internal flash).
[env:heltec_tracker_v2]
board = heltec_wifi_lora_32_V3
framework = arduino
board_build.partitions = partitions_tracker_v2.csv
build_flags =
    ${env.build_flags}
    -DTRACKER_HW_V2=1

; Legacy alias kept so existing scripts / docs that still say
; `heltec_wifi_lora_32_V3` keep working. Maps to the V1.2 build.
[env:heltec_wifi_lora_32_V3]
board = heltec_wifi_lora_32_V3
framework = arduino
build_flags =
    ${env.build_flags}
    -DTRACKER_HW_V1_2=1

; ----------------------------------------------------------------------------
; Native unit test environment.
; Runs on the host PC: `pio test -e native`
; Tests pure algorithmic logic that does not depend on ESP32 peripherals.
; All test suites are in test/native_*/
; ----------------------------------------------------------------------------
[env:native]
platform = native
test_build_src = false
; No extra build_flags: default MSVC/GCC settings are fine for pure-logic tests.
test_filter = test_*_native
